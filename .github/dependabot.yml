version: 2
multi-ecosystem-groups:
  go-runtime:
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
updates:
  - package-ecosystem: gomod
    directory: /
    multi-ecosystem-group: go-runtime
    patterns:
      - "*"

  - package-ecosystem: docker
    directory: /
    multi-ecosystem-group: go-runtime
    patterns:
      - caddy
