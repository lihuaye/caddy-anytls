name: docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
      - "go.mod"
      - "go.sum"
      - "**/*.go"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
      - "go.mod"
      - "go.sum"
      - "**/*.go"
  workflow_dispatch:
  schedule:
    # Run the heavier race detector once daily at 04:00 Asia/Shanghai.
    - cron: "0 20 * * *"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FULL_CHECKS: ${{ github.ref_type == 'tag' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

jobs:
  go:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Caddy Docker version
        run: |
          set -euo pipefail

          module_version="$(go list -m -f '{{ .Version }}' github.com/caddyserver/caddy/v2)"
          builder_version="$(sed -n 's/^FROM caddy:\([0-9][^- ]*\)-builder AS builder$/\1/p' Dockerfile)"
          runtime_version="$(sed -n 's/^FROM caddy:\([0-9][^ ]*\)$/\1/p' Dockerfile)"

          if [ -z "$builder_version" ] || [ -z "$runtime_version" ]; then
            echo "Could not parse Caddy image versions from Dockerfile" >&2
            exit 1
          fi
          if [ "$builder_version" != "$runtime_version" ]; then
            echo "Caddy builder image ${builder_version} does not match runtime image ${runtime_version}" >&2
            exit 1
          fi
          if [ "$module_version" != "v${builder_version}" ]; then
            echo "Dockerfile Caddy image ${builder_version} does not match go.mod ${module_version}" >&2
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Race test
        if: env.FULL_CHECKS == 'true'
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Verify modules
        if: env.FULL_CHECKS == 'true'
        run: go mod verify

      - name: Staticcheck
        if: env.FULL_CHECKS == 'true'
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

      - name: golangci-lint
        if: env.FULL_CHECKS == 'true'
        uses: golangci/golangci-lint-action@v9

  docker:
    runs-on: ubuntu-latest
    needs: go
    if: github.ref_type == 'tag' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      actions: read
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Decide whether to publish
        id: publish
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          REF_TYPE: ${{ github.ref_type }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          set -euo pipefail

          publish=false
          reason="not a publishing event"

          if [ "$REF_TYPE" = "tag" ]; then
            publish=true
            reason="release tag"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            publish=true
            reason="manual dispatch"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            previous_sha="$(gh run list \
              --workflow "$WORKFLOW_NAME" \
              --event schedule \
              --status success \
              --limit 1 \
              --json headSha \
              --jq '.[0].headSha // ""')"

            if [ -z "$previous_sha" ]; then
              publish=true
              reason="no previous successful scheduled run"
            elif [ "$previous_sha" = "$GITHUB_SHA" ]; then
              reason="scheduled run already published this commit"
            elif git diff --quiet "$previous_sha" "$GITHUB_SHA" -- \
              Dockerfile \
              .dockerignore \
              .github/workflows/docker.yml \
              go.mod \
              go.sum \
              ':(glob)**/*.go'; then
              reason="no Docker or Go inputs changed since previous scheduled run"
            else
              publish=true
              reason="Docker or Go inputs changed since previous scheduled run"
            fi
          fi

          {
            echo "push=$publish"
            echo "reason=$reason"
          } >> "$GITHUB_OUTPUT"

          echo "$reason"

      - name: Set up Docker Buildx
        if: steps.publish.outputs.push == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        if: steps.publish.outputs.push == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Log in to GHCR
        if: steps.publish.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.publish.outputs.push == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push
        if: steps.publish.outputs.push == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
